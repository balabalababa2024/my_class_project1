<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>校园失物招领智能匹配系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ===== 主容器 ===== */
        .app-container {
            width: 100%;
            max-width: 1400px;
            height: 92vh;
            max-height: 900px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== 视图切换 ===== */
        .view {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            animation: fadeSlide 0.3s ease-out;
        }
        .view.active { display: flex; }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ========== 顶部导航栏 ========== */
        .top-nav {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 16px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-area i { font-size: 28px; }
        .logo-area h1 { font-size: 22px; font-weight: 700; }
        .logo-badge {
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .nav-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.15);
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }
        .nav-icon:hover { background: rgba(255,255,255,0.3); }
        .nav-icon .badge {
            position: absolute;
            top: -2px;
            right: -2px;
            background: #ff4757;
            color: #fff;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 16px;
            text-align: center;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        .logout-btn:hover { background: rgba(255,255,255,0.35); }

        /* ===== 标签栏 ===== */
        .tab-bar {
            display: flex;
            background: #fff;
            border-bottom: 1px solid #e8e8e8;
            padding: 0 20px;
            overflow-x: auto;
        }
        .tab-item {
            padding: 14px 20px;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: 0.2s;
            white-space: nowrap;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
        }
        .tab-item:hover { color: #667eea; }
        .tab-item.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        .tab-item i { margin-right: 6px; }

        /* ===== 主体内容区 ===== */
        .main-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            background: #f5f7fa;
        }
        .main-body::-webkit-scrollbar { width: 6px; }
        .main-body::-webkit-scrollbar-thumb { background: #ccc; border-radius: 8px; }

        /* 子视图 */
        .sub-view { display: none; animation: fadeSlide 0.3s ease-out; }
        .sub-view.active { display: block; }

        /* ===== 统计卡片网格 ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            transition: 0.2s;
        }
        .stat-card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .stat-card .card-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 12px;
        }
        .stat-card .card-icon.lost { background: #fff3e0; color: #ff9800; }
        .stat-card .card-icon.found { background: #e8f5e9; color: #4caf50; }
        .stat-card .card-icon.match { background: #e3f2fd; color: #2196f3; }
        .stat-card .card-icon.claim { background: #f3e5f5; color: #9c27b0; }
        .stat-card .card-title {
            font-size: 13px;
            color: #999;
            margin-bottom: 8px;
        }
        .stat-card .card-value {
            font-size: 28px;
            font-weight: 700;
            color: #333;
        }

        /* ===== 物品卡片网格 ===== */
        .item-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .item-card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            transition: 0.2s;
            cursor: pointer;
        }
        .item-card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .item-card .item-image {
            height: 160px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        .item-card .item-content {
            padding: 16px;
        }
        .item-card .item-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }
        .item-card .item-info {
            font-size: 13px;
            color: #999;
            margin-bottom: 4px;
        }
        .item-card .item-info i { width: 16px; margin-right: 6px; }
        .item-card .item-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #f0f0f0;
        }
        .item-card .item-time {
            font-size: 12px;
            color: #bbb;
        }
        .status-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-tag.pending { background: #fff3e0; color: #ff9800; }
        .status-tag.matched { background: #e3f2fd; color: #2196f3; }
        .status-tag.claimed { background: #e8f5e9; color: #4caf50; }
        .status-tag.expired { background: #f5f5f5; color: #999; }

        .type-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
            margin-left: 6px;
            vertical-align: middle;
        }
        .type-tag i { margin-right: 3px; }
        .type-tag.lost-tag { background: #fff3e0; color: #e65100; }
        .type-tag.found-tag { background: #e8f5e9; color: #2e7d32; }

        /* ===== 表单样式 ===== */
        .form-container {
            max-width: 600px;
            margin: 0 auto;
        }
        .form-card {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
        .form-card h3 {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-card h3 i { color: #667eea; }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }
        .form-group label .required {
            color: #ff4757;
            margin-left: 2px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: 0.2s;
            background: #fff;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .upload-area {
            border: 2px dashed #e0e0e0;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .upload-area:hover {
            border-color: #667eea;
            background: rgba(102,126,234,0.02);
        }
        .upload-area i {
            font-size: 36px;
            color: #ccc;
            margin-bottom: 10px;
        }
        .upload-area p {
            font-size: 14px;
            color: #999;
        }
        .upload-preview {
            margin-top: 10px;
        }
        .upload-preview img {
            max-width: 200px;
            max-height: 150px;
            border-radius: 8px;
        }

        /* ===== 按钮样式 ===== */
        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-success {
            background: #4caf50;
            color: #fff;
        }
        .btn-success:hover { background: #43a047; }
        .btn-danger {
            background: #ff4757;
            color: #fff;
        }
        .btn-danger:hover { background: #ff3742; }
        .btn-outline {
            background: transparent;
            border: 1px solid #e0e0e0;
            color: #666;
        }
        .btn-outline:hover { border-color: #667eea; color: #667eea; }
        .btn-block {
            width: 100%;
            justify-content: center;
        }

        /* ===== 表格样式 ===== */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
        .data-table th {
            background: #f5f7fa;
            padding: 14px 16px;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: #666;
        }
        .data-table td {
            padding: 14px 16px;
            font-size: 14px;
            color: #333;
            border-bottom: 1px solid #f0f0f0;
        }
        .data-table tr:hover td { background: #fafafa; }
        .data-table .action-btns {
            display: flex;
            gap: 8px;
        }
        .data-table .action-btn {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }

        /* ===== 消息卡片 ===== */
        .msg-list { display: flex; flex-direction: column; gap: 12px; }
        .msg-card {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            gap: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: 0.2s;
        }
        .msg-card:hover { transform: translateX(4px); }
        .msg-card.unread { border-left: 3px solid #667eea; }
        .msg-card .msg-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .msg-icon.match { background: #e3f2fd; color: #2196f3; }
        .msg-icon.claim { background: #e8f5e9; color: #4caf50; }
        .msg-icon.system { background: #fff3e0; color: #ff9800; }
        .msg-card .msg-body { flex: 1; }
        .msg-card .msg-body h4 { font-size: 14px; color: #333; margin-bottom: 4px; }
        .msg-card .msg-body p { font-size: 13px; color: #999; }
        .msg-card .msg-time { font-size: 12px; color: #ccc; white-space: nowrap; }

        /* ===== 匹配结果 ===== */
        .match-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .match-score {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .match-score .score-bar {
            width: 100px;
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
        }
        .match-score .score-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 4px;
        }
        .match-score .score-text {
            font-size: 14px;
            font-weight: 600;
            color: #667eea;
        }
        .match-items {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 20px;
            align-items: center;
        }
        .match-item {
            background: #f5f7fa;
            border-radius: 10px;
            padding: 16px;
        }
        .match-item h4 {
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
        }
        .match-item p {
            font-size: 13px;
            color: #999;
            margin-bottom: 4px;
        }
        .match-arrow {
            font-size: 24px;
            color: #667eea;
        }

        /* ===== 搜索框 ===== */
        .search-box {
            display: flex;
            align-items: center;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 10px 16px;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-box:focus-within { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        .search-box i { color: #ccc; }
        .search-box input {
            border: none;
            outline: none;
            flex: 1;
            font-size: 14px;
        }
        .search-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-chip {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid #e0e0e0;
            background: #fff;
            transition: 0.2s;
        }
        .filter-chip:hover,
        .filter-chip.active {
            border-color: #667eea;
            color: #667eea;
            background: rgba(102,126,234,0.05);
        }

        /* ===== 分页 ===== */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
        }
        .page-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid #e0e0e0;
            background: #fff;
            transition: 0.2s;
        }
        .page-btn:hover,
        .page-btn.active {
            border-color: #667eea;
            color: #667eea;
        }

        /* ===== 登录 & 注册 ===== */
        .auth-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .auth-card {
            background: #fff;
            border-radius: 24px;
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .auth-card h2 {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .auth-card h2 i { color: #667eea; }
        .auth-card .sub {
            color: #999;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .auth-card .form-group { margin-bottom: 20px; }
        .auth-card .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }
        .auth-card .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: 0.2s;
        }
        .auth-card .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .switch-text {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 14px;
        }
        .switch-text span {
            color: #667eea;
            font-weight: 600;
            cursor: pointer;
        }

        /* ===== 模态框 ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal h3 {
            font-size: 18px;
            color: #333;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .modal .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        /* ===== 空状态 ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-state i {
            font-size: 64px;
            color: #ddd;
            margin-bottom: 16px;
        }
        .empty-state h3 {
            font-size: 18px;
            color: #999;
            margin-bottom: 8px;
        }
        .empty-state p {
            font-size: 14px;
            color: #ccc;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .app-container { border-radius: 16px; height: 96vh; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .item-grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .match-items { grid-template-columns: 1fr; }
            .match-arrow { transform: rotate(90deg); }
        }
    </style>
</head>
<body>

<div class="app-container">

    <!-- ========== 登录视图 ========== -->
    <div id="loginView" class="view active">
        <div class="auth-wrapper">
            <div class="auth-card">
                <h2><i class="fas fa-search-location"></i> 校园失物招领</h2>
                <div class="sub">智能匹配系统 · 登录您的账户</div>
                <form id="loginForm">
                    <div class="form-group">
                        <label><i class="fas fa-id-card"></i> 学号</label>
                        <input type="text" id="loginStudentId" placeholder="请输入学号" required />
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> 密码</label>
                        <input type="password" id="loginPassword" placeholder="请输入密码" required />
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">
                        <i class="fas fa-sign-in-alt"></i> 登录
                    </button>
                </form>
                <div class="switch-text">
                    还没有账号？ <span id="toRegister">立即注册</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== 注册视图 ========== -->
    <div id="registerView" class="view">
        <div class="auth-wrapper">
            <div class="auth-card">
                <h2><i class="fas fa-user-plus"></i> 用户注册</h2>
                <div class="sub">创建您的账户</div>
                <form id="registerForm">
                    <div class="form-group">
                        <label><i class="fas fa-id-card"></i> 学号 <span class="required">*</span></label>
                        <input type="text" id="regStudentId" placeholder="请输入学号" required />
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> 姓名 <span class="required">*</span></label>

<script>
// ===== 全局变量 =====
const API_BASE = '';
let currentUser = null;
let categories = [];
let currentPage = 1;
let currentFilter = { type: 'all', status: null };
let isLoggedIn = false;

console.log('[DEBUG] 脚本开始执行');

// ===== 工具函数 =====
const $ = id => document.getElementById(id);

function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    $(id).classList.add('active');
}

function switchTab(tabName) {
    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.sub-view').forEach(v => v.classList.remove('active'));
    var tabBtn = document.querySelector('.tab-item[data-tab="' + tabName + '"]');
    if (tabBtn) tabBtn.classList.add('active');
    var tabContent = $('tab-' + tabName);
    if (tabContent) tabContent.classList.add('active');

    // 加载对应数据
    switch(tabName) {
        case 'dashboard': loadDashboard(); break;
        case 'items': loadItems(); break;
        case 'matches': loadMatches(); break;
        case 'claims': loadClaims(); break;
        case 'messages': loadNotifications(); break;
        case 'profile': loadProfile(); break;
        case 'announcement': loadAnnouncements(); break;
    }
}

function getToken() {
    return localStorage.getItem('token');
}

function setToken(token) {
    localStorage.setItem('token', token);
}

function clearToken() {
    localStorage.removeItem('token');
}

async function request(url, options = {}) {
    const token = getToken();
    const headers = {
        'Content-Type': 'application/json',
        ...(token ? { 'Authorization': `Bearer ${token}` } : {}),
        ...options.headers
    };

    console.log('[DEBUG] request:', url, 'token:', token ? '有' : '无');

    try {
        const response = await fetch(API_BASE + url, {
            ...options,
            headers
        });
        console.log('[DEBUG] response status:', response.status);
        const data = await response.json();
        console.log('[DEBUG] response data:', JSON.stringify(data).substring(0, 200));

        // 只在非登录接口返回401时跳转
        if (data.code === 401 && url !== '/user/login') {
            clearToken();
            isLoggedIn = false;
            showView('loginView');
            return null;
        }

        return data;
    } catch (error) {
        console.error('[DEBUG] Request failed:', url, error);
        return null;
    }
}

async function uploadFile(file, type = 'image') {
    const formData = new FormData();
    formData.append('file', file);

    const token = getToken();
    try {
        const response = await fetch(API_BASE + `/file/upload/${type}`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`
            },
            body: formData
        });
        const data = await response.json();
        if (data.code === 200) {
            return data.data.url;
        }
        return null;
    } catch (error) {
        console.error('Upload failed:', error);
        return null;
    }
}

function formatDate(dateStr) {
    if (!dateStr) return '';
    const date = new Date(dateStr);
    return date.toLocaleDateString('zh-CN');
}

function formatDateTime(dateStr) {
    if (!dateStr) return '';
    const date = new Date(dateStr);
    return date.toLocaleString('zh-CN');
}

function getStatusText(status) {
    const map = {
        0: '待匹配',
        1: '待认领',
        2: '已认领',
        3: '已过期'
    };
    return map[status] || '未知';
}

function getStatusClass(status) {
    const map = {
        0: 'pending',
        1: 'matched',
        2: 'claimed',
        3: 'expired'
    };
    return map[status] || '';
}

function getCategoryIcon(categoryId) {
    const icons = {
        1: '💻', 2: '📚', 3: '🪪', 4: '👕',
        5: '🔑', 6: '🎒', 7: '⚽', 8: '📦'
    };
    return icons[categoryId] || '📦';
}

function showMessage(msg, type = 'success') {
    // 简单提示
    alert(msg);
}

// ===== API调用 =====
async function login(studentId, password) {
    console.log('[DEBUG] login() 被调用, studentId:', studentId);
    const data = await request('/user/login', {
        method: 'POST',
        body: JSON.stringify({ studentId, password })
    });
    console.log('[DEBUG] login() 返回数据:', JSON.stringify(data));
    if (data && data.code === 200) {
        console.log('[DEBUG] 登录成功, token:', data.data.token ? '存在' : '不存在');
        setToken(data.data.token);
        currentUser = data.data;
        return true;
    }
    console.log('[DEBUG] 登录失败');
    return false;
}

async function register(formData) {
    const data = await request('/user/register', {
        method: 'POST',
        body: JSON.stringify(formData)
    });
    if (data && data.code === 200) {
        setToken(data.data.token);
        currentUser = data.data;
        return true;
    }
    return false;
}

async function loadCategories() {
    const data = await request('/category/list');
    if (data && data.code === 200) {
        categories = data.data;
        renderCategoryOptions();
    }
}

async function loadDashboard() {
    const data = await request('/statistics/dashboard');
    if (data && data.code === 200) {
        $('statLost').textContent = data.data.totalLost || 0;
        $('statFound').textContent = data.data.totalFound || 0;
        $('statPending').textContent = data.data.pendingMatch || 0;
        $('statClaimed').textContent = data.data.claimedCount || 0;
    }

async function loadItems(page = 1) {
    currentPage = page;
    let allItems = [];
    let totalRecords = 0;
    let totalPages = 0;

    // 构建查询参数
    let params = `page=${page}&size=12`;
    if (currentFilter.status !== null && currentFilter.status !== undefined) {
        params += `&status=${currentFilter.status}`;
    }
    const searchInput = $('itemSearch');
    const searchVal = searchInput ? searchInput.value : '';
    if (searchVal) {
        params += `&keyword=${encodeURIComponent(searchVal)}`;
    }

    // 根据类型加载数据
    if (currentFilter.type === 'lost') {
        // 只加载失物
        const data = await request(`/lost/page?${params}`);
        if (data && data.code === 200) {
            allItems = (data.data.records || []).map(item => ({ ...item, itemType: 'lost' }));
            totalRecords = data.data.total || 0;
            totalPages = data.data.pages || 0;
        }
    } else if (currentFilter.type === 'found') {
        // 只加载拾物
        const data = await request(`/found/page?${params}`);
        if (data && data.code === 200) {
            allItems = (data.data.records || []).map(item => ({ ...item, itemType: 'found' }));
            totalRecords = data.data.total || 0;
            totalPages = data.data.pages || 0;
        }
    } else {
        // 加载全部 - 同时请求失物和拾物
        const [lostData, foundData] = await Promise.all([
            request(`/lost/page?${params}`),
            request(`/found/page?${params}`)
        ]);

        if (lostData && lostData.code === 200) {
            const lostItems = (lostData.data.records || []).map(item => ({ ...item, itemType: 'lost' }));
            allItems.push(...lostItems);
        }
        if (foundData && foundData.code === 200) {
            const foundItems = (foundData.data.records || []).map(item => ({ ...item, itemType: 'found' }));
            allItems.push(...foundItems);
        }

        // 按创建时间排序
        allItems.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

        // 分页处理
        totalRecords = allItems.length;
        totalPages = Math.ceil(totalRecords / 12);
        const start = (page - 1) * 12;
        allItems = allItems.slice(start, start + 12);
    }

    renderItems({ records: allItems, total: totalRecords, page: page, pages: totalPages });
}

async function loadMatches() {
    // 获取用户的失物列表，然后查询匹配
    const data = await request('/lost/my');
    if (data && data.code === 200) {
        const lostItems = data.data;
        const matchList = [];

        for (const item of lostItems) {
            const matchData = await request(`/match/lost/${item.id}`);
            if (matchData && matchData.code === 200 && matchData.data.length > 0) {
                // 获取每个匹配的拾物详情
                for (const m of matchData.data) {
                    const foundData = await request(`/found/detail/${m.foundItemId}`);
                    matchList.push({
                        ...m,
                        lostItem: item,
                        foundItem: foundData && foundData.code === 200 ? foundData.data : null
                    });
                }
            }
        }

        renderMatches(matchList);
    }
}

function renderPagination(pageResult) {
    const pagination = $('itemPagination');
    const { page, pages } = pageResult;

    if (pages <= 1) {
        pagination.innerHTML = '';
        return;
    }

    let html = '';
    html += `<div class="page-btn" onclick="loadItems(${Math.max(1, page - 1)})"><i class="fas fa-chevron-left"></i></div>`;

    for (let i = 1; i <= pages; i++) {
        html += `<div class="page-btn ${i === page ? 'active' : ''}" onclick="loadItems(${i})">${i}</div>`;
    }

    html += `<div class="page-btn" onclick="loadItems(${Math.min(pages, page + 1)})"><i class="fas fa-chevron-right"></i></div>`;

    pagination.innerHTML = html;
}

function renderMatches(matches) {
    const list = $('matchList');

    if (!matches || matches.length === 0) {
        list.innerHTML = `
            <div class="empty-state">
                <i class="fas fa-link"></i>
                <h3>暂无匹配结果</h3>
                <p>请先发布失物信息，然后点击"执行智能匹配"按钮</p>
            </div>
        `;
        return;
    }

    list.innerHTML = matches.map(function(match) {
        var foundItem = match.foundItem;
        var lostTitle = match.lostItem ? match.lostItem.title : '未知';
        var lostLoc = match.lostItem ? match.lostItem.lostLocation : '未知';
        var lostTime = match.lostItem ? match.lostItem.lostTime : null;
        var foundTitle = foundItem ? foundItem.title : '未知';
        var foundLoc = foundItem ? foundItem.foundLocation : '未知';
        var foundStorage = foundItem ? foundItem.storageLocation : '未知';
        var foundId = foundItem ? foundItem.id : 0;
        var score = Math.min(match.similarityScore, 100);
        var statusClass = match.status === 1 ? 'claimed' : 'expired';
        var statusText = match.status === 1 ? '已确认' : '已拒绝';
        return '<div class="match-card">' +
            '<div class="match-header">' +
                '<span style="font-size:14px; color:#999;">匹配时间：' + formatDateTime(match.createdAt) + '</span>' +
                '<div class="match-score">' +
                    '<div class="score-bar"><div class="score-fill" style="width:' + score + '%"></div></div>' +
                    '<span class="score-text">' + match.similarityScore + '%</span>' +
                '</div>' +
            '</div>' +
            '<div class="match-items">' +
                '<div class="match-item">' +
                    '<h4>🔍 我的失物</h4>' +
                    '<p><strong>' + lostTitle + '</strong></p>' +
                    '<p>丢失地点：' + lostLoc + '</p>' +
                    '<p>丢失时间：' + formatDateTime(lostTime) + '</p>' +
                '</div>' +
                '<div class="match-arrow"><i class="fas fa-arrows-alt-h"></i></div>' +
                '<div class="match-item">' +
                    '<h4>✋ 匹配的拾物</h4>' +
                    '<p><strong>' + foundTitle + '</strong></p>' +
                    '<p>拾取地点：' + foundLoc + '</p>' +
                    '<p>存放位置：' + foundStorage + '</p>' +
                    '<p>匹配类型：' + (match.matchType || '综合匹配') + '</p>' +
                '</div>' +
            '</div>' +
            '<div style="margin-top:16px; text-align:right;">' +
                (match.status === 0
                    ? '<button class="btn btn-success" onclick="openClaimModal(' + foundId + ', ' + match.lostItemId + ', ' + (foundItem ? foundItem.userId : 0) + ')"><i class="fas fa-hand-holding-heart"></i> 发起认领</button>' +
                      '<button class="btn btn-outline" onclick="rejectMatch(' + match.id + ')" style="margin-left:8px;"><i class="fas fa-times"></i> 拒绝</button>' +
                      '<button class="btn btn-primary" onclick="showItemDetail(' + foundId + ', \'found\')" style="margin-left:8px;"><i class="fas fa-eye"></i> 查看拾物详情</button>'
                    : '<span class="status-tag ' + statusClass + '">' + statusText + '</span>'
                ) +
            '</div>' +
        '</div>';
    }).join('');
}

function renderClaims(claims, isOwner) {
    var list = $('claimList');

    if (!claims || claims.length === 0) {
        list.innerHTML = '<div class="empty-state">' +
            '<i class="fas fa-check-circle"></i>' +
            '<h3>暂无认领记录</h3>' +
        '</div>';
        return;
    }

    list.innerHTML = claims.map(function(claim) {
        var statusClass = getStatusClass(claim.status === 1 ? 2 : claim.status);
        var statusText = claim.status === 0 ? '待确认' : claim.status === 1 ? '已确认' : claim.status === 2 ? '已拒绝' : '已取消';
        var lostTitle = claim.lostTitle || '未知';
        var foundTitle = claim.foundTitle || '未知';
        var desc = claim.description || '无';

        // 按钮区域：只有拾取方（收到的申请）才能操作
        var actionHtml = '';
        if (isOwner && claim.status === 0) {
            actionHtml = '<div style="text-align:right;">' +
                '<button class="btn btn-success" onclick="confirmClaim(' + claim.id + ')">' +
                    '<i class="fas fa-check"></i> 同意认领</button>' +
                '<button class="btn btn-danger" onclick="rejectClaim(' + claim.id + ')" style="margin-left:8px;">' +
                    '<i class="fas fa-times"></i> 拒绝</button>' +
            '</div>';
        }

        // 已确认时显示联系方式和认领地点
        var contactHtml = '';
        if (claim.status === 1) {
            var storageLoc = claim.foundStorageLocation || '未提供';
            var contact = claim.ownerContact || claim.ownerPhone || '请联系管理员获取';
            contactHtml = '<div style="background:#e8f5e9; padding:12px; border-radius:8px; margin-top:12px;">' +
                '<p style="color:#2e7d32; font-weight:600; margin-bottom:8px;"><i class="fas fa-info-circle"></i> 认领信息</p>' +
                '<p><strong>认领地点：</strong>' + storageLoc + '</p>' +
                '<p><strong>联系方式：</strong>' + contact + '</p>' +
            '</div>';
        }

        return '<div class="match-card">' +
            '<div class="match-header">' +
                '<span style="font-size:14px; color:#999;">申请时间：' + formatDateTime(claim.createdAt) + '</span>' +
                '<span class="status-tag ' + statusClass + '">' + statusText + '</span>' +
            '</div>' +
            '<div style="margin-bottom:12px;">' +
                '<p><strong>失物名称：</strong>' + lostTitle + '</p>' +
                '<p><strong>拾物名称：</strong>' + foundTitle + '</p>' +
                '<p><strong>认领说明：</strong>' + desc + '</p>' +
            '</div>' +
            contactHtml +
            actionHtml +
        '</div>';
    }).join('');
}

function setupUpload(areaId, inputId, previewId) {
    const area = $(areaId);
    const input = $(inputId);
    const preview = $(previewId);

    area.onclick = () => input.click();
    area.ondragover = (e) => { e.preventDefault(); area.style.borderColor = '#667eea'; };
    area.ondragleave = () => { area.style.borderColor = '#e0e0e0'; };
    area.ondrop = (e) => {
        e.preventDefault();
        area.style.borderColor = '#e0e0e0';
        if (e.dataTransfer.files.length) {
            input.files = e.dataTransfer.files;
            showPreview(input.files[0], preview);
        }
    };

    input.onchange = () => {
        if (input.files.length) {
            showPreview(input.files[0], preview);
        }
    };
}

function showPreview(file, previewEl) {
    const reader = new FileReader();
    reader.onload = (e) => {
        previewEl.innerHTML = `<img src="${e.target.result}" alt="预览" />`;
    };
    reader.readAsDataURL(file);
}

window.showItemDetail = async (id, type) => {
    const url = type === 'found' ? `/found/detail/${id}` : `/lost/detail/${id}`;
    const data = await request(url);
    if (data && data.code === 200) {
        const item = data.data;
        $('detailContent').innerHTML = `
            <div style="margin-bottom:16px;">
                <h4>${item.title}</h4>
                <p><strong>分类：</strong>${item.categoryName || '未知'}</p>
                <p><strong>地点：</strong>${item.lostLocation || item.foundLocation}</p>
                <p><strong>时间：</strong>${formatDateTime(item.lostTime || item.foundTime)}</p>
                <p><strong>描述：</strong>${item.description || '无'}</p>
                ${item.storageLocation ? `<p><strong>存放位置：</strong>${item.storageLocation}</p>` : ''}
                <p><strong>状态：</strong><span class="status-tag ${getStatusClass(item.status)}">${getStatusText(item.status)}</span></p>
            </div>
            ${item.imageUrl ? `<img src="${item.imageUrl}" style="max-width:100%; border-radius:8px;" />` : ''}
        `;
        $('detailModal').classList.add('active');
    }
};

async function init() {
    console.log('[DEBUG] init() 开始执行');
    const token = getToken();
    console.log('[DEBUG] 当前token:', token ? '存在' : '不存在');
    if (token) {
        const data = await request('/user/info');
        console.log('[DEBUG] /user/info 返回:', data);
        if (data && data.code === 200) {
            currentUser = data.data;
            $('displayName').textContent = currentUser.name;
            showView('mainView');
            loadCategories();
            loadDashboard();
            loadUnreadCount();
            isLoggedIn = true;
            checkAdminRole();
        } else {
            clearToken();
            showView('loginView');
        }
    } else {
        showView('loginView');
    }
    console.log('[DEBUG] init() 执行完毕');
}

init();
